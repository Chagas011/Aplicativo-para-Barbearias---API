# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: fincheck
# "service" is the name of this project. This will also be added to your AWS resource names.
service: barber-api

provider:
  name: aws
  region: us-east-1
  runtime: nodejs22.x
  memorySize: 128
  stage: ${opt:stage, 'dev'}
  environment: ${file(./sls/config/env.yml)}
  iam:
    role: ${file(./sls/config/role.yml)}
  httpApi:
    cors:
      allowedOrigins:
        - http://localhost:5173
      allowedHeaders: "*"
      allowedMethods: "*"
    authorizers:
      CognitoAuthorizer:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl: !GetAtt UserPool.ProviderURL
        audience:
          - !Ref UserPoolClient

package:
  individually: true

custom:
  cognito:
    PoolName: ${self:service}-${self:provider.stage}-UserPool

build:
  esbuild:
    configFile: ./esbuild.config.mjs

functions:
  - ${file(./sls/functions/auth.yml)}
  - ${file(./sls/functions/barber.yml)}
  - ${file(./sls/functions/barbershop.yml)}
  - ${file(./sls/functions/service.yml)}
  - ${file(./sls/functions/scheduling.yml)}
  - ${file(./sls/functions/plan.yml)}
  - ${file(./sls/functions/subscription.yml)}

resources:
  - ${file(./sls/resources/UserPool.yml)}
  - ${file(./sls/resources/MainTable.yml)}
  - ${file(./sls/resources/BarbershopBucket.yml)}
  - ${file(./sls/resources/BarbershopBucketCDN.yml)}
