listSubscription:
  handler: src/main/functions/subscription/listSubscription.handler
  events:
    - httpApi:
        path: /subscription
        method: GET
        authorizer:
          name: CognitoAuthorizer

createCheckoutSession:
  handler: src/main/functions/subscription/createCheckoutSession.handler
  events:
    - httpApi:
        path: /subscription/checkout
        method: POST
        authorizer:
          name: CognitoAuthorizer
